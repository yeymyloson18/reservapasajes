spring.application.name=pasajes-vraem

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/pasajes_vraem?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

# Plazo (en minutos) tras el cual una reserva PENDIENTE sin pago confirmado se libera automaticamente (FR-011)
app.reservas.minutos-expiracion=30
