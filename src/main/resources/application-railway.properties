# Perfil activo en Railway (SPRING_PROFILES_ACTIVE=railway).
# Las variables MYSQLHOST/MYSQLPORT/... las provee automaticamente el plugin
# "MySQL" de Railway cuando se referencian en las Variables del servicio web
# (ver README-DEPLOY-RAILWAY.md). PORT lo asigna Railway en runtime.

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
