<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Recuperar contrasena - Pasajes VRAEM</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main class="container" style="max-width: 480px;">
        <h1 class="h3 mb-4">Recuperar contrasena</h1>

        <div th:if="${errorGeneral}" class="alert alert-danger" th:text="${errorGeneral}"></div>

        <div th:if="${passwordTemporal}" class="alert alert-success">
            <p class="mb-1">Tu nueva contrasena temporal es:</p>
            <p class="fs-4 fw-bold" th:text="${passwordTemporal}">Vraem123456</p>
            <p class="small mb-0">Copiala ahora, no se volvera a mostrar. Inicia sesion y, si quieres, luego registrate de nuevo con otra contrasena.</p>
        </div>

        <form th:if="${passwordTemporal == null}" th:action="@{/recuperar-password}"
              th:object="${recuperarPasswordForm}" method="post" novalidate>
            <div class="mb-3">
                <label class="form-label" for="email">Email de tu cuenta</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" />
                <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Generar contrasena temporal</button>
        </form>

        <p class="mt-3 text-center">
            <a th:href="@{/login}">Volver a iniciar sesion</a>
        </p>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
