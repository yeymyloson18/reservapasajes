<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Mis reservas - Pasajes VRAEM</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main class="container">
        <h1 class="h3 mb-4">Mis reservas</h1>

        <div th:if="${#lists.isEmpty(reservas)}" class="alert alert-secondary">
            Todavia no tienes reservas. <a th:href="@{/viajes}">Ver viajes disponibles</a>.
        </div>

        <div class="list-group mb-4">
            <div class="list-group-item d-flex justify-content-between align-items-center"
                 th:each="reserva : ${reservas}">
                <a class="text-decoration-none flex-grow-1" th:href="@{/reservas/{id}(id=${reserva.id})}">
                    <strong th:text="${reserva.viaje.origen + ' &rarr; ' + reserva.viaje.destino}">Ruta</strong>
                    &mdash; <span th:text="${reserva.viaje.fecha}">2026-01-01</span>
                </a>
                <span class="badge me-2"
                      th:classappend="${reserva.estado.name() == 'PAGADO'} ? 'bg-success' : (${reserva.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' : (${reserva.estado.name() == 'RECHAZADA'} ? 'bg-danger' : 'bg-secondary'))"
                      th:text="${reserva.estado}">PENDIENTE</span>
                <a th:if="${reserva.estado.name() == 'PAGADO'}" class="btn btn-sm btn-success"
                   th:href="@{/reservas/{id}(id=${reserva.id})}">Ver boleta</a>
            </div>
        </div>

        <h2 class="h5 mb-3">Historial de viajes</h2>
        <p class="text-muted">Has viajado <strong th:text="${totalViajes}">0</strong> vez(veces) con nosotros.</p>
        <div th:if="${#lists.isEmpty(historial)}" class="alert alert-secondary">
            Todavia no tienes viajes realizados.
        </div>
        <ul class="list-group" th:unless="${#lists.isEmpty(historial)}">
            <li class="list-group-item" th:each="reserva : ${historial}">
                <span th:text="${reserva.viaje.origen + ' &rarr; ' + reserva.viaje.destino}">Ruta</span>
                &mdash; <span th:text="${reserva.viaje.fecha}">2026-01-01</span>
            </li>
        </ul>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
