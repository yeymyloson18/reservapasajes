<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Gestionar viajes - Panel ADMIN - Pasajes VRAEM</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main class="container">
        <p class="mb-2"><a th:href="@{/admin}">&larr; Volver al panel</a></p>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">Gestionar viajes</h1>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/admin/viajes/archivados}">Ver archivados</a>
                <a class="btn btn-primary" th:href="@{/admin/viajes/nuevo}">+ Nuevo viaje</a>
            </div>
        </div>

        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
        <div th:if="${errorGeneral}" class="alert alert-danger" th:text="${errorGeneral}"></div>

        <div th:if="${#lists.isEmpty(viajes)}" class="alert alert-secondary">
            Todavia no hay viajes creados.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(viajes)}">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Ruta</th>
                        <th>Chofer</th>
                        <th>Camioneta</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Precio</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${viajes}" th:with="viaje=${item.viaje()}">
                        <td th:text="${viaje.origen + ' &rarr; ' + viaje.destino}">Ruta</td>
                        <td th:text="${viaje.chofer}">Chofer</td>
                        <td th:text="${viaje.camioneta.placa}">ABC-123</td>
                        <td th:text="${viaje.fecha}">2026-01-01</td>
                        <td th:text="${viaje.hora}">08:00</td>
                        <td>S/ <span th:text="${viaje.precio}">0.00</span></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/viajes/{id}/editar(id=${viaje.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/reservas(viajeId=${viaje.id})}">Ver reservas</a>
                            <form th:if="${item.completo()}" th:action="@{/admin/viajes/{id}/archivar(id=${viaje.id})}" method="post"
                                  th:attr="onsubmit=|return confirm('¿Archivar el viaje ${viaje.origen} -> ${viaje.destino}? Ya no aparecera en las listas activas.')|">
                                <button type="submit" class="btn btn-sm btn-outline-success">Archivar</button>
                            </form>
                            <form th:action="@{/admin/viajes/{id}/eliminar(id=${viaje.id})}" method="post"
                                  th:attr="onsubmit=|return confirm('¿Eliminar el viaje ${viaje.origen} -> ${viaje.destino}?')|">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
