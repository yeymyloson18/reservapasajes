<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(~{::title})}">
    <title>Usuarios - Panel ADMIN - Pasajes VRAEM</title>
</head>
<body>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <main class="container">
        <p class="mb-2"><a th:href="@{/admin}">&larr; Volver al panel</a></p>

        <h1 class="h3 mb-4">Usuarios registrados</h1>

        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.dni}">00000000</td>
                        <td th:text="${usuario.nombre}">Nombre</td>
                        <td th:text="${usuario.email}">correo@example.com</td>
                        <td>
                            <span class="badge" th:classappend="${usuario.rol.name() == 'ADMIN'} ? 'bg-dark' : 'bg-primary'"
                                  th:text="${usuario.rol}">PASAJERO</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
